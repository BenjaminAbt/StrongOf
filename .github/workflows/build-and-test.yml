name: Build and Test (Reusable)

on:
  workflow_call:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Release'
      upload-test-results:
        description: 'Whether to upload test results as artifacts'
        required: true
        type: boolean
      upload-packages:
        description: 'Whether to upload NuGet packages'
        required: true
        type: boolean
    outputs:
      version:
        description: 'The calculated version from NBGV'
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.nbgv.outputs.SemVer2 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET (stable)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Setup .NET (preview)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      - name: Calculate Version with NBGV
        uses: dotnet/nbgv@master
        id: nbgv
        with:
          setAllVars: true

      - name: Version Info
        run: |
          echo "Calculated version: ${{ steps.nbgv.outputs.SemVer2 }}"

      - name: Build
        run: dotnet build --configuration ${{ inputs.configuration }} --verbosity minimal /p:Version=${{ steps.nbgv.outputs.SemVer2 }}

      - name: Test
        # --no-build reuses artifacts from the Build step above.
        # Arguments after '--' are passed directly to the xunit.v3 MTP runner.
        # '--report-xunit-trx' is the xUnit.net TRX reporter (not the VSTest '--logger' flag,
        # which MTP does not support).
        run: dotnet test --configuration ${{ inputs.configuration }} --no-build --verbosity normal /p:Version=${{ steps.nbgv.outputs.SemVer2 }} -- --report-xunit-trx

      - name: Upload test results
        if: always() && inputs.upload-test-results
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'

      - name: Pack NuGet packages
        run: dotnet pack --configuration ${{ inputs.configuration }} --no-build --include-symbols -p:SymbolPackageFormat=snupkg --output ./artifacts /p:PackageVersion=${{ steps.nbgv.outputs.SemVer2 }}

      - name: Upload NuGet packages
        if: inputs.upload-packages
        uses: actions/upload-artifact@v6
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          retention-days: 30
