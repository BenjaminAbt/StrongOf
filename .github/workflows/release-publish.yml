name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-nuget:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "*.nupkg" \
            --pattern "*.snupkg" \
            --dir ./artifacts \
            --repo "${{ github.repository }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x

      - name: Verify packages
        run: |
          echo "Packages to be published:"
          ls -la ./artifacts/*.nupkg
          echo "Symbol packages to be published:"
          ls -la ./artifacts/*.snupkg

          # Verify package count
          PACKAGE_COUNT=$(ls ./artifacts/*.nupkg | wc -l)
          if [ "$PACKAGE_COUNT" -eq 0 ]; then
            echo "Error: No packages found!"
            exit 1
          fi

          SYMBOL_COUNT=$(ls ./artifacts/*.snupkg | wc -l)
          if [ "$SYMBOL_COUNT" -eq 0 ]; then
            echo "Error: No symbol packages found!"
            exit 1
          fi

          if [ "$PACKAGE_COUNT" -ne "$SYMBOL_COUNT" ]; then
            echo "Error: Package count ($PACKAGE_COUNT) does not match symbol package count ($SYMBOL_COUNT)!"
            exit 1
          fi

          echo "Found $PACKAGE_COUNT package(s) and $SYMBOL_COUNT symbol package(s) to publish"

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: |
          for package in ./artifacts/*.nupkg; do
            echo "Publishing $package to NuGet.org..."
            dotnet nuget push "$package" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

          for symbol in ./artifacts/*.snupkg; do
            echo "Publishing symbol package $symbol to NuGet.org..."
            dotnet nuget push "$symbol" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

          echo "All packages and symbol packages published successfully!"

      - name: Upload published packages as artifacts
        uses: actions/upload-artifact@v6
        with:
          name: published-nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          retention-days: 90
